<div class="module-page">
  <div class="page-hdr">
    <div><h1 class="page-title">Performance Reviews</h1><p class="page-sub">Employee evaluation cycles</p></div>
    <button mat-raised-button color="primary"><mat-icon>add</mat-icon> New Review</button>
  </div>
  <div class="data-card">
    <table mat-table [dataSource]="reviews">
      <ng-container matColumnDef="employee">
        <th mat-header-cell *matHeaderCellDef>Employee</th>
        <td mat-cell *matCellDef="let r">
          <div class="name-cell">
            <span class="name-main">{{ r.employee?.name || '—' }}</span>
            <span class="name-sub">{{ r.reference_no }}</span>
          </div>
        </td>
      </ng-container>
      <ng-container matColumnDef="period">
        <th mat-header-cell *matHeaderCellDef>Review Period</th>
        <td mat-cell *matCellDef="let r" class="td-muted">{{ r.review_period || '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="reviewer">
        <th mat-header-cell *matHeaderCellDef>Reviewer</th>
        <td mat-cell *matCellDef="let r" class="td-muted">{{ r.reviewer?.name || '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="score">
        <th mat-header-cell *matHeaderCellDef>Score</th>
        <td mat-cell *matCellDef="let r">
          <span *ngIf="r.final_score" [style.color]="scoreCls(r.final_score)" style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700">
            {{ r.final_score }}/5
          </span>
          <span *ngIf="!r.final_score" style="color:var(--text3)">—</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let r"><span class="status-badge" [class]="statusCls(r.status)">{{ (r.status||'').replace('_',' ') }}</span></td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r">
          <button mat-icon-button matTooltip="View"><mat-icon style="color:#8b949e;font-size:18px;width:18px;height:18px">visibility</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky:true"></tr>
      <tr mat-row *matRowDef="let row; columns:displayedColumns;" class="data-row"></tr>
      <tr class="mat-row" *matNoDataRow><td class="mat-cell empty-td" colspan="6">
        <ng-container *ngIf="loading"><mat-spinner diameter="28"></mat-spinner></ng-container>
        <ng-container *ngIf="!loading"><mat-icon>insights</mat-icon> No reviews found</ng-container>
      </td></tr>
    </table>
  </div>
</div>
