<div class="module-page">
  <div class="page-hdr">
    <div><h1 class="page-title">Recruitment</h1><p class="page-sub">Open positions and applications</p></div>
    <button mat-raised-button color="primary"><mat-icon>post_add</mat-icon> Post Job</button>
  </div>
  <div class="data-card">
    <table mat-table [dataSource]="jobs">
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Job Title</th>
        <td mat-cell *matCellDef="let r">
          <div class="name-cell">
            <span class="name-main">{{ r.title }}</span>
            <span class="name-sub">{{ r.job_id }}</span>
          </div>
        </td>
      </ng-container>
      <ng-container matColumnDef="department">
        <th mat-header-cell *matHeaderCellDef>Department</th>
        <td mat-cell *matCellDef="let r" class="td-muted">{{ r.department?.name || '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let r" class="td-muted">{{ (r.employment_type || '') | titlecase }}</td>
      </ng-container>
      <ng-container matColumnDef="applicants">
        <th mat-header-cell *matHeaderCellDef>Applicants</th>
        <td mat-cell *matCellDef="let r" style="color:var(--accent);font-family:'JetBrains Mono',monospace">{{ r.applicants_count ?? '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let r"><span class="status-badge" [class]="statusCls(r.status)">{{ r.status || '—' }}</span></td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r">
          <button mat-icon-button matTooltip="View applicants"><mat-icon style="color:#8b949e;font-size:18px;width:18px;height:18px">group</mat-icon></button>
          <button mat-icon-button matTooltip="Edit"><mat-icon style="color:#8b949e;font-size:18px;width:18px;height:18px">edit</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky:true"></tr>
      <tr mat-row *matRowDef="let row; columns:displayedColumns;" class="data-row"></tr>
      <tr class="mat-row" *matNoDataRow><td class="mat-cell empty-td" colspan="6">
        <ng-container *ngIf="loading"><mat-spinner diameter="28"></mat-spinner></ng-container>
        <ng-container *ngIf="!loading"><mat-icon>work_outline</mat-icon> No job openings</ng-container>
      </td></tr>
    </table>
  </div>
</div>
