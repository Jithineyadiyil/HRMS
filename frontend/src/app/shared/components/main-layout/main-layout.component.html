<div class="app-shell" [class.sidebar-collapsed]="!sidebarOpen">

  <!--
    Hidden SVG sprite — define the diamond logo ONCE here.
    Both the expanded and collapsed brand areas reference it via <use>.
    Gradients are scoped to this single <defs> block, no duplication.
  -->
  <svg width="0" height="0" style="position:absolute;overflow:hidden" aria-hidden="true">
    <defs>
      <linearGradient id="logo-fill" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#3b82f6"/>
        <stop offset="100%" stop-color="#6366f1"/>
      </linearGradient>
      <linearGradient id="logo-shine" x1="0%" y1="0%" x2="60%" y2="100%">
        <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <symbol id="hrms-diamond" viewBox="0 0 30 30">
        <polygon points="15,2 28,12 15,28 2,12" fill="url(#logo-fill)"/>
        <polygon points="15,2 8,12 15,12"        fill="url(#logo-shine)"/>
        <polygon points="15,2 22,12 15,12"        fill="rgba(255,255,255,0.12)"/>
        <line x1="2"  y1="12" x2="28" y2="12" stroke="rgba(255,255,255,0.18)" stroke-width="0.6"/>
        <line x1="15" y1="2"  x2="2"  y2="12" stroke="rgba(255,255,255,0.22)" stroke-width="0.5"/>
      </symbol>
    </defs>
  </svg>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">

      <!-- Expanded brand -->
      <div class="brand" *ngIf="sidebarOpen">
        <div class="brand-icon">
          <svg class="diamond-svg" aria-label="HRMS logo"><use href="#hrms-diamond"/></svg>
        </div>
        <div class="brand-text">
          <div class="brand-name">HRMS</div>
          <div class="portal-badge"
               [style.color]="portalInfo.color"
               [style.background]="portalInfo.color + '18'">
            <mat-icon>{{ portalInfo.icon }}</mat-icon>{{ portalInfo.label }}
          </div>
        </div>
      </div>

      <!-- Collapsed brand — icon only -->
      <div class="brand brand-mini" *ngIf="!sidebarOpen">
        <div class="brand-icon">
          <svg class="diamond-svg" aria-label="HRMS logo"><use href="#hrms-diamond"/></svg>
        </div>
      </div>

      <button class="toggle-btn" (click)="toggleSidebar()">
        <mat-icon>{{ sidebarOpen ? 'menu_open' : 'menu' }}</mat-icon>
      </button>
    </div>

    <!-- Grouped navigation -->
    <nav class="nav-list">
      <ng-container *ngFor="let group of navGroups">
        <div class="nav-section-label" *ngIf="group.label && sidebarOpen">{{ group.label }}</div>
        <div class="nav-section-divider" *ngIf="group.label && !sidebarOpen"></div>
        <a *ngFor="let item of group.items"
           class="nav-link"
           [routerLink]="[item.path]"
           routerLinkActive="nav-active">
          <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
          <span class="nav-text" *ngIf="sidebarOpen">{{ item.label }}</span>
        </a>
      </ng-container>
    </nav>

    <!-- Footer — expanded -->
    <div class="sidebar-footer" *ngIf="sidebarOpen">
      <div class="user-card">
        <div class="user-avatar">{{ userInitials }}</div>
        <div class="user-info">
          <div class="user-name">{{ user?.name }}</div>
          <div class="user-role">{{ roleLabel }}</div>
        </div>
        <button class="logout-btn" matTooltip="Logout" (click)="logout()">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </div>

    <!-- Footer — collapsed -->
    <div class="sidebar-footer-mini" *ngIf="!sidebarOpen">
      <button class="logout-btn-mini" matTooltip="{{ user?.name }} — Logout" (click)="logout()">
        <div class="user-avatar-mini">{{ userInitials }}</div>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

</div>
